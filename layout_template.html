<style>

body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

div#csv {
    display: none;
}

@media only screen and (orientation: portrait) {
    
    #carousel {
        width: 98vw;
        margin: auto;
        margin-top: 10vw;
        background-color: black;
    }

    #card_view {
        width: 98vw;
        height: 108vw;
        margin: auto;
        display: flex;
        overflow-x: scroll;
        overflow-y: hidden;
        scroll-snap-type: x mandatory;
        scroll-direction: horizontal;
    }
    
    div.item_card {
        width: 98vw;
        height: 108vw;
        margin: auto;
        background-color: blue;
        scroll-snap-align: center;
        scroll-margin: 0;
        flex: 0 0 auto;
    }
    
    div.item_name {
        width: 98vw;
        height: 10vw;
        margin: auto;
    }
    
    div.item_name > span {
        width: 100%;
        height: 100%;
        margin: auto;
        font-family: "Courier", monospace; 
        font: "Inconsolata"; 
        max-font-size: 20px; 
        font-weight: bolder; 
        text-transform: uppercase;
        overflow-x: scroll;
        text-wrap-mode: wrap;
        background-color: goldenrod;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    div.item_photo {
        width: 100%;
        height: 100%;
        margin: auto;
        background-color: transparent;
    }

    div#carousel div#item_list {
        height: min(20vw, 20vh);
        width: 98vw;
        margin: auto;
        padding: 0;
        left: 0;
        background: transparent;
        overflow-x: scroll;
        overflow-y: visible;
        scroll-direction: horizontal;
        scroll-snap-type: x mandatory;
        vertical-align: middle;
        animation-name: ease;
        animation-direction: normal;
        transition-property: transform, height;
        transition-duration: 0.2s, 0.2s, 1s;
        transition-timing-function: ease-out;
        display: grid;
        grid-template-columns: repeat(555, min(18.8vw, 18.8vh));
        grid-auto-rows: min(18.8vw, 18.8vh);
        grid-auto-columns: min(18.8vw, 18.8vh);
        grid-gap: min(1vw, 1vh);
        background-color: orange;
    }
    
    div#carousel div#item_list img {
        scroll-snap-align: start;
        /*scroll-snap-stop: always;*/
        width: min(18.8vw, 18.8vh);
        height: auto;
        opacity: 0.75;
        box-shadow: 0 0 1px black;
        /*flex-margin: auto;
        flex-shrink: 0;*/
        white-space: wrap;
        margin: 0;
        padding: 0;
    }
    
    div#carousel div#item_list.shown img {
        margin: auto;
    }
    
    div#carousel div#item_list img.color {
        opacity: 1;
    }
    
    div#carousel div#item_list img.grayed {
        filter: grayscale(1);
    }
    
    div#carousel div#item_list::-webkit-scrollbar {
        display: none;
    }
}

</style>
