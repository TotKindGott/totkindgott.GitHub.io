<script>
checkMode();
//document.getElementById('page_footer').classList.add('fixed-position');
    
const csv_url = 'https://totkindgott.github.io/collection.csv';
var search_term = "Honda";
    
const getCSV = async () => {
    try {
        LOG(">>> running getCSV() ...")
        const res = await fetch(csv_url);
        if (res.status === 200) {
            const data = await res.text();
            
            LOG(`fetched ${data.length.toLocaleString("en-US")} characters`);
        document.getElementById("csv").innerHTML = data;
        
            SUCCESS(`fetch("${csv_url}") response status: ${res.status}`);
        } else {
            ERROR(`Error code ${res.status} in fetch(${csv_url})`);
        }; // if / else block ends
    } catch (error) {
        ERROR(`Error in getCSV(): ${error}`);
    } finally {
        SUCCESS("getCSV() run status: OK");
    }; // try / catch block ends
}; // getCSV declaration ends



function debounce(func, timeout = 300){
    let timer;
    return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            func.apply(this, args); 
        }, timeout);
  };
};

function copy(text) {
    navigator.clipboard.writeText(text);
    showNotification("copied");
}

function search() {
    openMessages();
    LOG(">>> running search() in main file ...");
    var query = document.getElementById("search_bar").value;
    var match_count = 0;

    if (!query) {
        WARN("empty search string");
    } else {
        LOG(`searching for ${query}`)
        var count = 0;
        var data = document.getElementById("csv").innerText;
        var text = data.split("\n");
        var headers = text.shift();
        var lines = new Array();
        var images = new Array();
        for (var l = 0; l < text.length; l++) {
    
            if (text[l].toLowerCase().includes(query.toLowerCase())) {
                m = new Model(l, text[l]);
                //m.id = `item${l}`;
                //f = m.make_frame_view();
                f = m.make_card_view();
                lines.push(f);
                i = m.make_thumbnail_view();
                images.push(i);
                count += 1;
            }; // if block ends
        }; // for loop ends
        LOG(`search() returned ${count} matches`);
        document.getElementById("card_view").innerHTML = lines.join('');
        document.getElementById("item_list").innerHTML = images.join("");
            setActivationEvent();
            updateCount(count);
            match_count = count;
    }; // if else block ends
    match_count > 0 ? SUCCESS('search() run status: OK') : ERROR('search() run status: error [nothing found]') & show_messages();
    hideMessages();
};

function showNotification(text) {
    var el = document.getElementById("notification");
    el.innerHTML = `<pre>${text}</pre>`;
    el.style.display = "block";
    setTimeout(hideNotification, 1000);
}

function hideNotification() {
    document.getElementById("notification").style.display = "none";
}

function toggleMessages() {
    let msgs = document.getElementById("messages");
    if (msgs.style.display == "none") {
        msgs.style.display = "block";
    } else {
        msgs.style.display = "none";
    };
};

function openMessages() {
    document.getElementById("messages").style.display = "block";
};

function hideMessages() {
    document.getElementById("messages").style.display = "none";
};

getCSV();
setTimeout(search, 1000);
document.getElementById("search_bar").addEventListener("change", search);
verticalSwipeActions("item_list", showCollage, hideCollage, 100); 
// Collage view by default
document.getElementById('item_list').classList.add('shown');

setTimeout(initialOptionParse, 2500);
//setTimeout(toggleMessages, 2000)
</script>
