<script>
    
const csv_url = 'https://totkindgott.github.io/collection.csv';
//var search_term = "Honda";
    
const getCSV = async () => {
    try {
        LOG(">>> running getCSV() ...")
        const res = await fetch(csv_url);
        if (res.status === 200) {
            const data = await res.text();
        document.getElementById("csv").innerHTML = data;
            SUCCESS(`fetch("${csv_url}") response status: ${res.status}`);
            NOTE(`fetched ${data.length.toLocaleString("en-US")} characters`);
        } else {
            ERROR(`Error code ${res.status} in fetch(${csv_url})`);
        }; // if / else block ends
    } catch (error) {
        ERROR(`Error in getCSV(): ${error}`);
    } finally {
        SUCCESS("getCSV() run status: OK");
    }; // try / catch block ends
}; // getCSV declaration ends


function search() {
    //console.time("timer");
    let start = performance.now();
    openMessages();
    LOG(">>> running search() in main file ...");
            
    var query = document.getElementById("search_bar").value;
    var filter = new Filter();
    var match_count = 0;

    if (!query) {
        WARN("empty search string");
    };
    NOTE(`searching for ${query}`);
    var count = 0;
    var data = document.getElementById("csv").innerText;
    var text = data.split("\n");
    var headers = text.shift();
    var lines = new Array();
    var images = new Array();
    for (var l = 0; l < text.length; l++) {

        if (text[l].toLowerCase().includes(query.toLowerCase())) {
            m = new Model(l, text[l]);
            //m.id = `item${l}`;
            //f = m.make_frame_view();
            if (m.series.toLowerCase().includes(seriesSelectorInput.value.toLowerCase()) && m.tag.toLowerCase().includes(tagSelectorInput.value.toLowerCase()) && m.year.includes(yearSelectorInput.value) && m.condition.toLowerCase().includes(conditionSelectorInput.value.toLowerCase()) && m.origin.toLowerCase().includes(sourceSelectorInput.value.toLowerCase())) {
            f = m.make_card_view();
            lines.push(f);
            i = m.make_thumbnail_view();
            images.push(i);
            filter.add_data(m);
            count += 1;
            }; // nested if ends
        }; // if block ends
    }; // for loop ends
        LOG(`search() returned ${count} matches`);
        document.getElementById("card_view").innerHTML = lines.join('');
        document.getElementById("item_list").innerHTML = images.join("");
            setActivationEvent();
            updateCount(count);
            match_count = count;

    match_count > 0 ? SUCCESS('search() run status: OK') : ERROR('search() run status: error [nothing found]') & show_messages();
    //console.timeEnd("timer");
    let end = performance.now();
    NOTE(`search() executed in ${Number((end - start)/1000).toFixed(2)} s`);
    filter.apply_filters();
    hideMessages();
};

async function initialSetup() {
    let init_start = performance.now();
    LOG(">>> running initialSetup() ...");
    checkMode();
    await getCSV();
    await initialOptionParse();
    await search();
    let init_end = performance.now();
    NOTE(`initialSetup() executed in ${Number((init_end - init_start)/1000).toFixed(2)} s`);
};

initialSetup();
//getCSV();
//setTimeout(search, 1000);
document.getElementById("search_bar").addEventListener("change", search);
//document.getElementById("search_bar").addEventListener("keyup", processChange);
verticalSwipeActions("item_list", showCollage, hideCollage, 100); 
// Collage view by default

//setTimeout(initialOptionParse, 2500);
//setTimeout(toggleMessages, 2000)

</script>
