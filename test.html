    <script>
        const csv_url = 'https://totkindgott.github.io/collection.csv';
        var search_term = "Honda";
        var models = new Array();
        var line_num = 2;

const getCSV = async () => {
    try {
        const res = await fetch(csv_url);
        if (res.status === 200) {
            const data = await res.text();
            var text = data.split("\n");
            var headers = text.shift();
            var lines = new Array();
            for (var l = 0; l < text.length; l++) {

                if (text[l].includes(search_term)) {
                    m = new Model(text[l]);
                    f = m.make_frame_view();
                    lines.push(f);
                }; // if block ends
            }; // for loop ends
        document.getElementById("results").innerHTML = lines.join("");
            console.log(`Response status: ${res.status}`);
            //console.log(data)
        } else {
            console.log(`Error code ${res.status}`);
        };
    } catch (err) {
        console.error("error:", err);
    };
}
