    <script>
const csv_url = 'https://totkindgott.github.io/collection.csv';
var search_term = "Honda";

//var line_num = 2;
const collectables = document.getElementById("results");
const carousel = document.getElementById("carousel");
    
const getCSV = async () => {
    try {
        const res = await fetch(csv_url);
        if (res.status === 200) {
            const data = await res.text();
            var text = data.split("\n");
            var headers = text.shift();
            var lines = new Array();
            var images = new Array();
            for (var l = 0; l < text.length; l++) {

                if (text[l].toLowerCase().includes(search_term.toLowerCase())) {
                    m = new Model(text[l]);
                    m.id = `item${l}`;
                    //f = m.make_frame_view();
                    f = m.make_card_view();
                    lines.push(f);
                    i = m.make_thumbnail_view();
                    images.push(i);
                }; // if block ends
            }; // for loop ends
            
        document.getElementById("results").innerHTML = text.join('');
        //document.getElementById("carousel").innerHTML = lines.join("");
        document.getElementById("card_view").innerHTML = lines.join('');
        document.getElementById("item_list").innerHTML = images.join("");
        
            console.log(`Response status: ${res.status}`);
            //console.log(data)
            setActivationEvent();
        verticalSwipeActions("item_list", showCollage, hideCollage, 100); 
        } else {
            console.log(`Error code ${res.status}`);
        }; // if / else block ends
    } catch (err) {
        console.error("error:", err);
    }; // try / catch block ends
}; // getCSV declaration ends
    

        </script>
