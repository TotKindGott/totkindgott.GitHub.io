<script>
    
function timed(func) {
    return function (...args) {
        let start_time = performance.now();
        LOG(`>>> running ${func.name}() ...`)
        const result = func(...args);
        let end_time = performance.now();
        NOTE(`${func.name}() executed in ${Number((end_time - start_time)/1000).toFixed(2)} s`);
        return result;
    };
};

const models = new Array();
const csv_url = 'https://totkindgott.github.io/collection.csv';
let search_result = new Array();
//var search_term = "Honda";
    
const getCSV = async () => {
    try {
        let start = performance.now();
        LOG(">>> running getCSV() ...")
        const res = await fetch(csv_url);
        if (res.status === 200) {
            const data = await res.text();
        document.getElementById("csv").innerHTML = data;
            SUCCESS(`fetch("${csv_url}") response status: ${res.status}`);
            NOTE(`fetched ${data.length.toLocaleString("en-US")} characters`);
            let end = performance.now();
            NOTE(`getCSV() executed in ${Number((end - start)/1000).toFixed(2)} s`);
        } else {
            ERROR(`Error code ${res.status} in fetch(${csv_url})`);
        }; // if / else block ends
    } catch (error) {
        ERROR(`Error in getCSV(): ${error}`);
    } finally {
        SUCCESS("getCSV() run status: OK");
    }; // try / catch block ends
}; // getCSV declaration ends

function parseCSV() {
    let start = performance.now();
    LOG(">>> running parseCSV()");
    let count = 0;
    let csv =  document.getElementById("csv").innerHTML;
    let lines = csv.split("\n");
    let headers = lines.shift();
    NOTE(lines.length, "lines in csv");
    try {
        lines.forEach(line => {
            count += 1;
            models.push(new Model(count, line));
            });
    } catch (error) {
        ERROR(error);
    };
    SUCCESS(models.length, "models processed");
    let end = performance.now();
    NOTE(`parseCSV() executed in ${Number((end - start)/1000).toFixed(2)} s`);
}

// TODO: separate csv into tags/collections/years etc at initialOptionParse() to search by selectors through
// possibly apply Model class there too - needs testing

function search() {
    //console.time("timer");
    let start = performance.now();
    openMessages();
    
    LOG("<hr />");
    LOG(">>> running search() in main file ...");
            
    var query = document.getElementById("search_bar").value;
    var filter = new Filter();
    var match_count = 0;
    let SELECTORS = false;
    
    let _tag = tagSelectorInput.value;
    let _year = yearSelectorInput.value;
    let _series = seriesSelectorInput.value;
    let _source = sourceSelectorInput.value;
    let _condition = conditionSelectorInput.value;

    if (!query) {
        WARN("empty search string");
        SELECTORS = true;
    } else {
        OPTION(`searching for: ${query}`);
    };
    
    _tag ? OPTION("with tag:", _tag) : void(0);
    _year ? OPTION("with year:", _year) : void(0);
    _series ? OPTION("with series:", _series) : void(0);
    _source ? OPTION("with source:", _source) : void(0);
    _condition ? OPTION("with condition:", _condition) : void(0);
    LOG("<hr />");
    
    var count = 0;
    var data = document.getElementById("csv").innerText;
    var text = data.split("\n");
    var headers = text.shift();
    var lines = new Array();
    var images = new Array();
    let matches = new Array();
    for (var l = 0; l < text.length; l++) {
        
        //let line = text[l].toLowerCase();

        if (text[l].toLowerCase().includes(query.toLowerCase(), _tag.toLowerCase(), _series.toLowerCase(), _condition.toLowerCase(), _source.toLowerCase())) {
            m = new Model(l, text[l]);
            // filtering by year is not working above
            //m.id = `item${l}`;
            //f = m.make_frame_view();
            if (m.series.toLowerCase().includes(_series.toLowerCase()) && m.tag.toLowerCase().includes(_tag.toLowerCase()) && m.year.toString().includes(_year) && m.condition.toLowerCase().includes(_condition.toLowerCase()) && m.origin.toLowerCase().includes(_source.toLowerCase())) {
            f = m.make_card_view();
            lines.push(f);
            i = m.make_thumbnail_view();
            images.push(i);
            filter.add_data(m);
            CLIP(m.missing_photo);
            count += 1;
            matches.push(m);
            }; // nested if ends
        }; // if block ends
    }; // for loop ends
        NOTE(`search() returned ${count} ${count == 1 ? "items" : "items"}`);
        document.getElementById("card_view").innerHTML = lines.join('');
        document.getElementById("item_list").innerHTML = images.join("");
            setActivationEvent();
            match_count = count;
    //console.timeEnd("timer");
    updateCount(match_count);
    filter.apply_filters();
    search_result = matches;
    
    let end = performance.now();
    NOTE(`search() executed in ${Number((end - start)/1000).toFixed(2)} s`);
    match_count > 0 ? SUCCESS(`search() run status: OK [ ${count} ${count == 1 ? "items" : "items"} ]`) & (CONSOLE_STATE == "" && hideMessages()) : ERROR('search() run status: error [ nothing found ]') & openMessages();
};

function match() {
    
    let start = performance.now();
    
    if (search_result.length < 1) {
        LOG(">>> match() redirecting to search()");
        search();
        return;
    };
    
    LOG("<hr />");
    LOG(">>> running match() on", search_result.length, "objects from recent search for", searchBar.value);
    
    let matched = new Array();
    let filter = new Filter();
    
    let _tag = tagSelectorInput.value;
    let _year = yearSelectorInput.value;
    let _series = seriesSelectorInput.value;
    let _source = sourceSelectorInput.value;
    let _condition = conditionSelectorInput.value;
    
    _tag ? OPTION("with tag:", _tag) : void(0);
    _year ? OPTION("with year:", _year) : void(0);
    _series ? OPTION("with series:", _series) : void(0);
    _source ? OPTION("with source:", _source) : void(0);
    _condition ? OPTION("with condition:", _condition) : void(0);
    LOG("<hr />");
    
    search_result.forEach(m => {
        if (m.series.toLowerCase().includes(_series.toLowerCase()) && m.tag.toLowerCase().includes(_tag.toLowerCase()) && m.year.toString().includes(_year) && m.condition.toLowerCase().includes(_condition.toLowerCase()) && m.origin.toLowerCase().includes(_source.toLowerCase())) {
            matched.push(m);
            filter.add_data(m);
        }; // if block ends
    }); // forEach block ends
    NOTE("match() returned", matched.length,   matched.length == 1 ? "item" : "items");
    
    display(matched);
    filter.apply_filters();
    updateCount(matched.length);
    
    let end = performance.now();
    NOTE(`match() executed in ${Number((end - start)/1000).toFixed(2)} s`);
    matched.length > 0 ? SUCCESS(`match() run status: OK [ ${matched.length} ${matched.length == 1 ? "item" : "items"} ]`) & (CONSOLE_STATE == "" && hideMessages()) : ERROR('match() run status: error [nothing found]') & openMessages();
}; // match() declaration ends

function display(models) {
    LOG(">>> running display() on", models.length, models.length == 1 ? "item" : "items");
    
    let lines = new Array();
    let images = new Array();

    models.forEach(model => {
            f = model.make_card_view();
            lines.push(f);
            i = model.make_thumbnail_view();
            images.push(i);
            CLIP(model.missing_photo);
    });
    document.getElementById("card_view").innerHTML = lines.join('');
    document.getElementById("item_list").innerHTML = images.join("");
    setActivationEvent();
};

function consoleAutoDismiss() {
    CONSOLE_STATE = "";
    document.getElementById("console_toggle").style.backgroundImage = 'url("Images/Icons/terminal-outline.svg")';
        LOG("console auto-dismiss: ON")
}; 

function consoleKeepOpen() {
    CONSOLE_STATE = "open";
    document.getElementById("console_toggle").style.backgroundImage = 'url("Images/Icons/terminal.svg")';
    LOG("console auto-dismiss: OFF")
};

function toggleConsoleState() {
    if (CONSOLE_STATE == "") {
        consoleKeepOpen();
    } else {
        consoleAutoDismiss();
    };
};
