<script>

function getLocalText() {
    let _result = new Array();
    try {
    localStorage.getItem("models").split("\n").forEach(line => {
            _result.push(line)
        });
    } catch (TypeError) {
        void(0);
    };
    return _result;
};

function addToLocalText(line) {
    let _result = getLocalText().join("\n");
    if (_result.length > 0) {
        _result += "\n" + line;
    } else {
        _result = line;
    };
    localStorage.setItem("models", _result);
    NOTE("written to localStorage");
};

function displayLocalText() {
    try {
        LOG(">>> checking localStorage ...");
        let _models = getLocalText();
        if (_models.length > 0) {
            NOTE("localStorage items:", _models.length);
            SUCCESS("localStorage status: OK");
            NOTE("<hr />");
            _models.forEach(line => {
                CLIP(line);
            });
            NOTE("<hr />");
        } else {
            throw Error("localStorage status: empty");
        }
    } catch (error) {
        NOTE(error.message);
    };
};

function removeLocalText() {
    localStorage.removeItem("models");
    LOG("localStorage cleared");
    showNotification("localStorage cleared");
};
    
const csv_url = 'https://totkindgott.github.io/collection.csv';

// 1. Select the form element
const form = document.getElementById('model_form');
// 2. Attach the submit event listener
form.addEventListener('submit', function(event) {
// 3. Stop the browser from performing a full page reload
    event.preventDefault(); 
  
  // 4. Run your custom JavaScript function code
    handleFormAction(event); 
});

form.addEventListener('reset', function(event) {
    showNotification("form reset");
});

function handleFormAction(event) {
  // Get data from form fields
    const model_name = document.getElementById('model').value;
    const series_name = document.getElementById('collection').value;
    const tag_name = document.getElementById('tag').value;
    const condition = document.getElementById('condition').value;
    const year = document.getElementById('year').value;
    const source = document.getElementById('source').value;
    const quantity = document.getElementById('quantity').value;
    const number = document.getElementById('number').value;
    const part = document.getElementById('part').value;
    const note = document.getElementById('note').value;
// const headers = [Collection,Year,Part,Model,Number,Stamp,Condition,Origin,URL,Tags,Quantity,Image,Note]
  let csv_line = `${series_name},${year},${part.toString().replace(".", "/")},${model_name},${number.toString().replace(".", "/")},,${condition},${source},,${tag_name},${quantity},,${note}`;
  m = new Model(0, csv_line);
  NOTE("<hr />");
  CLIP(csv_line);
  addToLocalText(csv_line);
  //CLIP(m.missing_photo);
  NOTE("<hr />");
  copy(csv_line);
  // Optional: You can send data via an API using fetch() here
};

const getCSV = async () => {
    try {
        let start = performance.now();
        LOG(">>> running getCSV() ...")
        const res = await fetch(csv_url);
        if (res.status === 200) {
            const data = await res.text();
        document.getElementById("csv").innerHTML = data;
            SUCCESS(`fetch("${csv_url}") response status: ${res.status}`);
            NOTE(`fetched ${data.length.toLocaleString("en-US")} characters`);
            let end = performance.now();
            NOTE(`getCSV() executed in ${Number((end - start)/1000).toFixed(2)} s`);
        } else {
            ERROR(`Error code ${res.status} in fetch(${csv_url})`);
        }; // if / else block ends
    } catch (error) {
        ERROR(`Error in getCSV(): ${error}`);
    } finally {
        SUCCESS("getCSV() run status: OK");
    }; // try / catch block ends
}; // getCSV declaration ends

function parseCSV() {
    let start = performance.now();
    LOG(">>> running parseCSV() ...");
    let filter = new FormFilter();
    let count = 0;
    let csv =  document.getElementById("csv").innerHTML;
    let lines = csv.split("\n");
    let headers = lines.shift();
    NOTE(lines.length, "lines in csv");
    try {
        lines.forEach(line => {
            count += 1;
            filter.parse(line);
            //models.push(new Model(count, line));
            });
    } catch (error) {
        ERROR(error);
    };
    filter.apply_filters();
    NOTE(count, "models processed");
    let end = performance.now();
    NOTE(`parseCSV() executed in ${Number((end - start)/1000).toFixed(2)} s`);
    SUCCESS("parseCSV() run status: OK");
}

class FormFilter {
    constructor() {
        this.models      = new Set();
        this.collections = new Set();
        this.years       = new Set();
        this.tags        = new Set();
        this.conditions  = new Set();
        this.sources     = new Set();
        this.parts       = new Set();
        this.numbers     = new Set();
        this.notes       = new Set();
    }; // constructor ends
    
    parse(text) { // from csv line
        let csvalues = text.split(",");
        this.models.add(csvalues[3]);
        this.collections.add(csvalues[0]);
        this.years.add(csvalues[1]);
        this.tags.add(csvalues[9]);
        //this.images.add(csvalues[11]);
        this.conditions.add(csvalues[6]);
        this.parts.add(csvalues[2]);
        this.numbers.add(csvalues[4]);
        this.sources.add(csvalues[7]);
        //this.stamp = csvalues[5];
        //this.url = csvalues[8];
        this.notes.add(csvalues[12]);
        //this.quantity = csvalues[10];
    };
    
    clear_filters() {
        // manipulating innerHTML
        document.getElementById("series").innerHTML = "";
        document.getElementById("years").innerHTML = "";
        document.getElementById("tags").innerHTML = "";
        document.getElementById("conditions").innerHTML = "";
        document.getElementById("sources").innerHTML = "";
        NOTE("search filters cleared");
    }; // clear_filters() ends

    
    apply_filters() {
        
        let _collections = Array.from(this.collections).sort();
        let _years = Array.from(this.years).sort();
        let _tags = Array.from(this.tags).sort();
        let _conditions = Array.from(this.conditions).sort();
        let _sources = Array.from(this.sources).sort();
        let _models = Array.from(this.models).sort();
        let _parts = Array.from(this.parts).sort();
        let _numbers = Array.from(this.numbers).sort();
        let _notes = Array.from(this.notes).sort();
        
        this.clear_filters();

        _collections.forEach(name => {
            if (name) {
                document.getElementById("series").innerHTML += `<option value="${name}">`
            };
        });
        _years.forEach(year => {
            if (year) {
                document.getElementById("years").innerHTML += `<option value="${year}">`
            };
        });
        _tags.forEach(tag => {
            if (tag) {
               document.getElementById("tags").innerHTML += `<option value="${tag}">`
            };
        });
        _conditions.forEach(condition => {
            if (condition) {
                document.getElementById("conditions").innerHTML += `<option value="${condition}">`
            };
        });
        _sources.forEach(source => {
            if (source) {
                document.getElementById("sources").innerHTML += `<option value="${source}">`
            };
        });
        _models.forEach(model => document.getElementById("models").innerHTML += `<option value="${model}">`);
        _numbers.forEach(number => document.getElementById("numbers").innerHTML += `<option value="${number}">`);
        _parts.forEach(part => document.getElementById("parts").innerHTML += `<option value="${part}">`);
        _notes.forEach(note => document.getElementById("notes").innerHTML += `<option value="${note}">`);
        
        NOTE("search filters overwritten");
        
        HIGHLIGHT(`tags: ${_tags.length} | years: ${_years.length} | collections: ${_collections.length} | sources: ${_sources.length} | conditions: ${_conditions.length}`);
        
        // HIGHLIGHT("tags:", _tags.length);
        // HIGHLIGHT("years:", _years.length);
        // HIGHLIGHT("collections:", _collections.length);
        // HIGHLIGHT("sources:", _sources.length);
        // HIGHLIGHT("conditions:", _conditions.length);

    }; // apply() ends
    
}; // class declaration ends

async function setupForm() {
    checkMode();
    setSearchRedirect();
    await getCSV();
    parseCSV();
    displayLocalText();
    setTimeout(hideMessages, 500);
    //removeLocalText();
};

setupForm();
